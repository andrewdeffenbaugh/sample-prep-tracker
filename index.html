<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample Preparation Tracker</title>
<style>
/* Keep all your styles (same as before) */
body { font-family: Arial; background:#f8fafc; margin:0; }
.container { max-width:1000px; margin:30px auto; }
.card { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,.1); }
.stat { font-size:28px; font-weight:bold; }
.progress { height:10px; background:#ddd; border-radius:10px; overflow:hidden; }
.bar { height:100%; background:#2563eb; }
</style>
</head>

<body>
<div class="container">
  <div class="card">
    <h2>Sample Preparation Tracker</h2>

    <div>
      <strong id="planId"></strong>
    </div>

    <div>Total: <span id="total">0</span></div>
    <div>Prepared: <span id="prepared">0</span></div>

    <div class="progress">
      <div id="progressBar" class="bar" style="width:0%"></div>
    </div>

    <div id="tissues"></div>

    <div style="margin-top:10px; font-size:12px; color:gray" id="lastUpdated"></div>
  </div>
</div>

<script>

// ✅ ✅ ✅ REPLACE ONLY THIS URL ✅ ✅ ✅
const DATA_URL = "https://bayergroup.sharepoint.com/sites/RegSciSampleManagementTeam/Shared Documents/General/SampleTrackerData.json";

// store data
let plans = [];
let currentIndex = 0;

// load JSON from SharePoint
async function loadData() {
  try {
    const response = await fetch(DATA_URL, { cache: "no-store" });
    const data = await response.json();

    const grouped = {};

    data.forEach(row => {
      if (!grouped[row.plan]) {
        grouped[row.plan] = [];
      }

      grouped[row.plan].push({
        type: row.tissue,
        total: row.total,
        prepared: row.prepared
      });
    });

    plans = Object.keys(grouped).map(id => ({
      id: id,
      tissues: grouped[id]
    }));

    currentIndex = 0;
    render();

    document.getElementById("lastUpdated").innerText =
      "Last updated: " + new Date().toLocaleString();

  } catch (error) {
    console.error("Error loading data:", error);
  }
}

// render UI
function render() {
  if (!plans.length) return;

  const plan = plans[currentIndex];

  let total = 0;
  let prepared = 0;

  plan.tissues.forEach(t => {
    total += t.total;
    prepared += t.prepared;
  });

  const percent = total ? Math.round((prepared / total) * 100) : 0;

  document.getElementById("planId").innerText = plan.id;
  document.getElementById("total").innerText = total;
  document.getElementById("prepared").innerText = prepared;
  document.getElementById("progressBar").style.width = percent + "%";

  const tissueDiv = document.getElementById("tissues");
  tissueDiv.innerHTML = "";

  plan.tissues.forEach(t => {
    const p = t.total ? Math.round((t.prepared / t.total) * 100) : 0;

    tissueDiv.innerHTML += `
      <div style="margin-top:10px">
        ${t.type}: ${t.prepared}/${t.total} (${p}%)
      </div>
    `;
  });
}

// load initially
loadData();

// auto refresh every 5 min
setInterval(loadData, 300000);

</script>
</body>
</html>
