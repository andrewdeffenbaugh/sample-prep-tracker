<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sample Preparation Tracker</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 { margin-top: 0; }

input {
  padding: 6px;
  margin: 4px;
}

button {
  padding: 6px 10px;
  margin: 4px;
  cursor: pointer;
}

.progress {
  height: 12px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  background: green;
}

.tissue-card {
  border: 1px solid #ccc;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Sample Preparation Tracker</h1>
  <div id="lastUpdated">Loading...</div>

  <h3>Production Plan</h3>
  <input id="planId"/>

  <div>
    <button onclick="prevPlan()">Previous</button>
    <button onclick="nextPlan()">Next</button>
  </div>

  <h3>Totals</h3>
  <div>Total: <span id="total">0</span></div>
  <div>Prepared: <span id="prepared">0</span></div>
  <div class="progress"><div id="bar" class="bar"></div></div>

  <h3>Tissues</h3>
  <div id="tissues"></div>

  <h3>Add Tissue</h3>
  <input id="tType" placeholder="Type"/>
  <input id="tTotal" type="number" placeholder="Total"/>
  <input id="tPrep" type="number" placeholder="Prepared"/>
  <button onclick="addTissue()">Add</button>

  <h3>Add Plan</h3>
  <input id="newPlan"/>
  <button onclick="addPlan()">Add Plan</button>
</div>
